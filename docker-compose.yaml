services:
  web:
    container_name: helloworld_web
    build:
      context: ./src
      dockerfile: DfE.Cypmd.HelloWorld.Web/Dockerfile
    image: helloworld:latest
    ports: 
      - "8080:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ASPNETCORE_URLS=http://+:8080
      - ConnectionStrings__DefaultConnection=Host=db;Database=helloworld;Username=postgres;Password=postgres
    depends_on:
      - db

  db:
    container_name: helloworld_db
    image: postgres:16
    environment:
      - POSTGRES_DB=helloworld
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: